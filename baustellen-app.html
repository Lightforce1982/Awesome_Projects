:root{
  --bg:#F7F6FB;
  --paper:#FFFFFF;
  --ink:#211C2E;
  --muted:#7A7488;
  --line:#E6E1F0;
  --brand-1:#F10FF8;
  --brand-2:#9B4FE8;
  --brand-3:#3FC7D6;
  --brand-gradient:linear-gradient(95deg, var(--brand-1) 0%, var(--brand-2) 52%, var(--brand-3) 100%);
  --accent:#9B4FE8;
  --accent-ink:#5B1E8C;
  --accent-soft:#F3E7FC;
  --ok:#1F9E6D;
  --ok-bg:#E2F7EE;
  --warn:#D6394A;
  --warn-bg:#FBE7E9;
  --pending:#C98A12;
  --pending-bg:#FBF0D8;
  --radius:12px;
  --shadow:0 1px 2px rgba(90,30,140,.06), 0 6px 18px rgba(90,30,140,.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,.display{
  font-family:'Poppins',sans-serif;
  letter-spacing:-.01em;
  font-weight:700;
  margin:0;
}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

/* ---------- layout shell ---------- */
#shell{display:flex; min-height:100vh;}
#sidebar{
  width:236px; flex-shrink:0; background:var(--paper); color:var(--ink);
  display:flex; flex-direction:column; padding:22px 14px; border-right:1px solid var(--line);
}
#sidebar .brand{
  padding:2px 6px 18px 6px; border-bottom:1px solid var(--line); margin-bottom:14px;
}
#sidebar .brand img{display:block; width:150px; height:auto;}
#sidebar .brand small{display:block; font-family:'Inter',sans-serif; font-size:11px; color:var(--muted); letter-spacing:.02em; margin-top:6px; font-weight:500;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:9px;
  color:#5C5570; background:none; border:none; text-align:left; font-size:14.5px; font-weight:600;
  width:100%; margin-bottom:2px;
}
.nav-item .ic{width:20px; text-align:center; font-size:16px;}
.nav-item.active{background:var(--brand-gradient); color:#fff; box-shadow:0 4px 14px rgba(155,79,232,.32);}
.nav-item:not(.active):hover{background:var(--accent-soft); color:var(--accent-ink);}
#sidebar .site-picker{margin-top:auto; padding-top:14px; border-top:1px solid var(--line);}
#sidebar .site-picker label{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
#sidebar select{width:100%; margin-top:6px; padding:8px; border-radius:7px; border:1px solid var(--line); background:#FCFBFE; color:var(--ink); font-size:13px;}

#main{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{
  display:none; align-items:center; justify-content:space-between; padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--paper); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
}
#topbar .brand img{display:block; height:26px; width:auto;}
#content{flex:1; padding:22px 26px 90px 26px; max-width:1000px; width:100%; margin:0 auto;}

#bottomnav{
  display:none; position:fixed; bottom:0; left:0; right:0; background:var(--paper);
  border-top:1px solid var(--line); z-index:30; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
#bottomnav .row{display:flex;}
#bottomnav button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none;
  color:var(--muted); font-size:10.5px; font-weight:600; padding:6px 2px;
}
#bottomnav button .ic{font-size:19px;}
#bottomnav button.active{color:var(--brand-2);}
#bottomnav button.active .ic{filter:drop-shadow(0 0 0 var(--brand-2));}

@media (max-width:880px){
  #sidebar{display:none;}
  #topbar{display:flex;}
  #bottomnav{display:block;}
  #content{padding:16px 14px 84px 14px;}
}

/* ---------- shared bits ---------- */
.shared-banner{
  background:var(--accent-soft); color:var(--accent-ink); font-size:12.5px; padding:8px 12px;
  border-radius:8px; margin-bottom:16px; display:flex; gap:8px; align-items:flex-start;
}
.page-head{display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.page-head h1{font-size:22px;}
.page-head .sub{color:var(--muted); font-size:13px; margin-top:3px; font-family:'Inter',sans-serif; text-transform:none; letter-spacing:0;}
.btn{
  border:none; border-radius:8px; padding:9px 15px; font-weight:600; font-size:13.5px;
  display:inline-flex; align-items:center; gap:6px;
}
.btn-primary{background:var(--brand-gradient); color:#fff; box-shadow:0 3px 10px rgba(155,79,232,.28);}
.btn-primary:hover{filter:brightness(1.06);}
.btn-primary:disabled{background:var(--line); color:var(--muted); box-shadow:none;}
.btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn-ghost:hover{background:var(--accent-soft); border-color:var(--brand-2);}
.btn-sm{padding:6px 10px; font-size:12.5px; border-radius:7px;}
.btn-danger{background:var(--warn); color:#fff;}
.card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
.empty{
  text-align:center; padding:50px 20px; color:var(--muted); border:1.5px dashed var(--line); border-radius:12px;
}
.empty .ic{font-size:30px; margin-bottom:8px;}
.pill{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:100px; font-size:11.5px; font-weight:700; letter-spacing:.02em; text-transform:uppercase;}
.pill.open{background:var(--warn-bg); color:var(--warn);}
.pill.pending{background:var(--pending-bg); color:var(--pending);}
.pill.done{background:var(--ok-bg); color:var(--ok);}
.field{margin-bottom:13px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em;}
.field input[type=text], .field input[type=date], .field input[type=email], .field select, .field textarea{
  width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px; font-size:14px; background:#FCFBFE; color:var(--ink);
}
.field textarea{resize:vertical; min-height:70px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media (max-width:520px){.row2{grid-template-columns:1fr;}}

.modal-bg{position:fixed; inset:0; background:rgba(20,18,14,.45); display:flex; align-items:flex-end; justify-content:center; z-index:100;}
@media (min-width:640px){.modal-bg{align-items:center;}}
.modal{background:var(--paper); border-radius:14px 14px 0 0; width:100%; max-width:560px; max-height:92vh; overflow-y:auto; padding:20px 20px 26px;}
@media (min-width:640px){.modal{border-radius:14px;}}
.modal h2{font-size:18px; margin-bottom:14px;}
.modal-close{float:right; background:none; border:none; font-size:20px; color:var(--muted); line-height:1;}

/* --- tag / mangel card, signature element --- */
.tag-card{
  position:relative; background:var(--paper); border:1px solid var(--line); border-radius:10px;
  padding:14px 14px 14px 16px; margin-bottom:12px; overflow:hidden;
}
.tag-card::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:5px;
}
.tag-card.status-open::before{background:var(--warn);}
.tag-card.status-pending::before{background:var(--pending);}
.tag-card.status-done::before{background:var(--ok);}
.tag-id{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}
.tag-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:6px;}
.tag-title{font-size:15.5px; font-weight:700; margin-bottom:2px;}
.tag-meta{font-size:12px; color:var(--muted); margin-bottom:8px;}
.tag-desc{font-size:13.5px; color:#3A3548; margin-bottom:10px; white-space:pre-wrap;}
.tag-photos{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
.tag-photos img{width:58px; height:58px; object-fit:cover; border-radius:6px; border:1px solid var(--line); cursor:pointer;}
.tag-actions{display:flex; gap:8px; flex-wrap:wrap;}

.gewerk-chip{display:inline-block; background:#F1ECFA; border:1px solid var(--line); border-radius:6px; padding:2px 8px; font-size:11.5px; font-weight:600;}

.textblock-btn{
  background:#F7F3FC; border:1px solid var(--line); border-radius:7px; padding:6px 10px; font-size:12.5px;
  margin:0 6px 6px 0; font-weight:500;
}
.textblock-btn:hover{background:var(--accent-soft); border-color:var(--accent);}
.mic-btn{background:var(--ink); color:#fff; border:none; border-radius:100px; width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; font-size:14px;}
.mic-btn.rec{background:var(--warn); animation:pulse 1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(198,64,46,.5);}70%{box-shadow:0 0 0 10px rgba(198,64,46,0);}100%{box-shadow:0 0 0 0 rgba(198,64,46,0);}}

.weather-box{display:flex; align-items:center; gap:12px; background:#F7F3FC; border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:14px;}
.weather-box .ic{font-size:26px;}
.weather-box .temp{font-family:'Poppins',sans-serif; font-size:19px; font-weight:600;}

.diary-day{margin-bottom:22px;}
.diary-day .datehead{display:flex; align-items:baseline; gap:10px; margin-bottom:8px;}
.diary-day .datehead .d{font-family:'Poppins',sans-serif; font-size:16px; font-weight:600;}
.diary-entry-line{display:flex; gap:8px; font-size:13.5px; padding:7px 0; border-bottom:1px solid #EDE8F6;}
.diary-entry-line:last-child{border-bottom:none;}
.diary-entry-line .t{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:11.5px; flex-shrink:0; width:44px;}

.tabs{display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
.tabs button{background:none; border:none; padding:9px 12px; font-size:13.5px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent;}
.tabs button.active{color:var(--ink); border-color:var(--accent);}

.filters{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.filters select{padding:7px 9px; border-radius:7px; border:1px solid var(--line); font-size:12.5px; background:var(--paper);}

.site-card{padding:16px 18px; margin-bottom:12px; cursor:pointer;}
.site-card:hover{border-color:var(--accent);}
.site-card .name{font-size:16.5px; font-weight:700;}
.site-card .addr{font-size:12.5px; color:var(--muted); margin-top:2px;}
.site-card .stats{display:flex; gap:14px; margin-top:10px; font-size:12px; color:var(--muted);}
.site-card .stats b{color:var(--ink);}

.gewerk-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #EDE8F6;}
.gewerk-row:last-child{border-bottom:none;}
.gewerk-row .n{flex:1; font-weight:600; font-size:13.5px;}
.gewerk-row .e{flex:1; color:var(--muted); font-size:12.5px;}

.file-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #EDE8F6;}
.file-row .ic{font-size:20px;}
.file-row .n{flex:1; font-size:13.5px; font-weight:600;}
.file-row .s{color:var(--muted); font-size:11.5px;}

.toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; z-index:200; box-shadow:var(--shadow);}
@media (max-width:880px){.toast{bottom:78px;}}

.spinner{width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

.checklist-item{display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13.5px;}
.checklist-item input{width:16px; height:16px;}
</style>
</head>

<script>
/* =========================================================
   BAUSTELLEN-MANAGER — client-seitiger Prototyp
   Datenhaltung: window.storage (shared=true -> Team-weit sichtbar,
   damit Auftragnehmer Mängel über denselben App-Link selbst
   freimelden können). Siehe Hinweis-Banner in der App.
   ========================================================= */

const SHARED = true; // geteilte Daten für Team-Zusammenarbeit

let STATE = {
  sites: [],
  units: {},        // siteId -> [{id,name}]
  items: {},        // siteId -> [{id,unitId,title,desc,gewerkId,status,createdAt,dueDate,photoIds:[],log:[]}]
  gewerke: [],       // [{id,name,email}]
  textbausteine: [], // [{id,category,text}]
  diary: {},         // siteId -> { 'YYYY-MM-DD': {location,weather,entries:[{time,text}],photoIds:[]} }
  files: {},         // siteId -> [{id,name,size,type,dataUrl,addedAt}]
  activeSiteId: null,
};

let currentView = 'sites';
const uid = () => Math.random().toString(36).slice(2,9);
const todayKey = () => new Date().toISOString().slice(0,10);
const fmtDate = (iso) => { const d = new Date(iso); return d.toLocaleDateString('de-DE',{weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'}); };
const fmtDateShort = (iso) => new Date(iso).toLocaleDateString('de-DE');
const fmtTime = (iso) => new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

/* ---------------- storage helpers ---------------- */
async function sGet(key){
  try{ const r = await window.storage.get(key, SHARED); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), SHARED); return true; }
  catch(e){ console.error('storage set failed', key, e); toast('Speichern fehlgeschlagen'); return false; }
}

async function saveSites(){ await sSet('sites', STATE.sites); }
async function saveUnits(siteId){ await sSet('units:'+siteId, STATE.units[siteId]||[]); }
async function saveItems(siteId){ await sSet('items:'+siteId, STATE.items[siteId]||[]); }
async function saveGewerke(){ await sSet('gewerke', STATE.gewerke); }
async function saveTextbausteine(){ await sSet('textbausteine', STATE.textbausteine); }
async function saveDiary(siteId){ await sSet('diary:'+siteId, STATE.diary[siteId]||{}); }
async function saveFiles(siteId){ await sSet('files:'+siteId, STATE.files[siteId]||[]); }

/* ---------------- cloud storage (WebDAV / custom API) ---------------- */
// Verbindungseinstellungen (Adresse, Ordner, Anbieter) sind team-weit sichtbar (shared),
// Zugangsdaten (Benutzername/Passwort/Token) bleiben immer PERSÖNLICH auf diesem Konto
// und werden nie im geteilten Speicher abgelegt.
async function getCloudConfig(){ return await sGet('cloud-config'); } // shared
async function setCloudConfig(cfg){ await sSet('cloud-config', cfg); }
async function getCloudCreds(){
  try{ const r = await window.storage.get('cloud-credentials', false); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function setCloudCreds(creds){
  try{ await window.storage.set('cloud-credentials', JSON.stringify(creds), false); return true; }
  catch(e){ return false; }
}

function dataURLToBlob(dataUrl){
  const [header, b64] = dataUrl.split(',');
  const mime = (header.match(/data:(.*?);base64/)||[])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type:mime});
}

function cloudAuthHeaders(cfg, creds){
  const h = {};
  if(!creds) return h;
  if(cfg.authType==='bearer' && creds.token) h['Authorization'] = 'Bearer ' + creds.token;
  else if(creds.username) h['Authorization'] = 'Basic ' + btoa(creds.username + ':' + (creds.password||''));
  return h;
}

function buildCloudUrl(cfg, segments){
  let base = (cfg.baseUrl||'').replace(/\/+$/,'');
  let folder = (cfg.folder||'').replace(/^\/+|\/+$/g,'');
  const parts = [base];
  if(folder) parts.push(folder);
  parts.push(...segments.map(s=>encodeURIComponent(s)));
  return parts.join('/');
}

async function cloudTestConnection(){
  const cfg = await getCloudConfig();
  if(!cfg || !cfg.baseUrl) return {ok:false, reason:'not-configured'};
  const creds = await getCloudCreds();
  const url = (cfg.baseUrl.replace(/\/+$/,'')) + (cfg.folder ? '/' + cfg.folder.replace(/^\/+|\/+$/g,'') : '');
  const method = cfg.provider==='custom' ? 'GET' : 'PROPFIND';
  const headers = { ...cloudAuthHeaders(cfg, creds) };
  if(method==='PROPFIND') headers['Depth'] = '0';
  try{
    const res = await fetch(url, { method, headers });
    if(res.status===401 || res.status===403) return {ok:false, reason:'auth', status:res.status};
    if(res.status===404) return {ok:false, reason:'notfound', status:res.status};
    if(res.ok || (res.status>=200 && res.status<400)) return {ok:true, status:res.status};
    return {ok:false, reason:'other', status:res.status};
  }catch(e){
    return {ok:false, reason:'network'};
  }
}

async function cloudPut(segments, dataUrl, mime){
  const cfg = await getCloudConfig();
  if(!cfg || !cfg.baseUrl || cfg.connected===false) return {ok:false, reason:'not-configured'};
  const creds = await getCloudCreds();
  const url = buildCloudUrl(cfg, segments);
  const blob = dataURLToBlob(dataUrl);
  const headers = { 'Content-Type': mime || blob.type || 'application/octet-stream', ...cloudAuthHeaders(cfg, creds) };
  try{
    const res = await fetch(url, { method:'PUT', headers, body: blob });
    return { ok: res.ok, status: res.status, url };
  }catch(e){
    return { ok:false, reason:'network' };
  }
}

async function isCloudConfigured(){ const cfg = await getCloudConfig(); return !!(cfg && cfg.baseUrl); }

/* ---------------- bootstrap ---------------- */
async function loadAll(){
  STATE.sites = (await sGet('sites')) || [];
  STATE.gewerke = (await sGet('gewerke'));
  if(!STATE.gewerke){ STATE.gewerke = DEFAULT_GEWERKE; await saveGewerke(); }
  STATE.textbausteine = (await sGet('textbausteine'));
  if(!STATE.textbausteine){ STATE.textbausteine = DEFAULT_TEXTBAUSTEINE; await saveTextbausteine(); }

  for(const s of STATE.sites){
    STATE.units[s.id] = (await sGet('units:'+s.id)) || [];
    STATE.items[s.id] = (await sGet('items:'+s.id)) || [];
    STATE.diary[s.id] = (await sGet('diary:'+s.id)) || {};
    STATE.files[s.id] = (await sGet('files:'+s.id)) || [];
  }
  STATE.activeSiteId = STATE.sites[0]?.id || null;
  renderNavState();
  populateSiteSelects();
  render();
}

async function ensureSiteLoaded(siteId){
  if(STATE.units[siteId]) return;
  STATE.units[siteId] = (await sGet('units:'+siteId)) || [];
  STATE.items[siteId] = (await sGet('items:'+siteId)) || [];
  STATE.diary[siteId] = (await sGet('diary:'+siteId)) || {};
  STATE.files[siteId] = (await sGet('files:'+siteId)) || [];
}

function activeSite(){ return STATE.sites.find(s=>s.id===STATE.activeSiteId) || null; }
function gewerkById(id){ return STATE.gewerke.find(g=>g.id===id); }
function unitById(siteId,id){ return (STATE.units[siteId]||[]).find(u=>u.id===id); }

/* ---------------- nav ---------------- */
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click', ()=>{ currentView = btn.dataset.view; renderNavState(); render(); });
});
function renderNavState(){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.view===currentView));
}
function populateSiteSelects(){
  [document.getElementById('siteSelectDesktop'), document.getElementById('siteSelectMobile')].forEach(sel=>{
    sel.innerHTML = STATE.sites.length ? STATE.sites.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('') : `<option>— keine Baustelle —</option>`;
    sel.value = STATE.activeSiteId || '';
    sel.onchange = async (e)=>{ STATE.activeSiteId = e.target.value; await ensureSiteLoaded(STATE.activeSiteId); syncSiteSelects(); render(); };
  });
}
function syncSiteSelects(){
  [document.getElementById('siteSelectDesktop'), document.getElementById('siteSelectMobile')].forEach(sel=>{ sel.value = STATE.activeSiteId || ''; });
}

function esc(s){ return (s??'').toString().replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------------- router ---------------- */
function render(){
  const el = document.getElementById('content');
  if(currentView==='sites') return renderSites(el);
  if(currentView==='mangel') return renderMangel(el);

const photoCache = {}; // photoId -> dataUrl (loaded lazily)

async function ensurePhotosLoaded(photoIds){
  for(const pid of photoIds){
    if(!photoCache[pid]){

      if(v) photoCache[pid] = v;
    }
  }
}

async function onItemAction(e){
  const id = e.currentTarget.dataset.id, act = e.currentTarget.dataset.act;
  const site = activeSite();
  const items = STATE.items[site.id];
  const item = items.find(i=>i.id===id);
  if(act==='mail'){ sendMangelMail(item); return; }
  if(act==='markpending'){ item.status='pending'; item.log=(item.log||[]); item.log.push({t:new Date().toISOString(), a:'Als erledigt gemeldet'}); await saveItems(site.id); render(); toast('Als erledigt gemeldet'); return; }
  if(act==='confirm'){ item.status='done'; item.log=(item.log||[]); item.log.push({t:new Date().toISOString(), a:'Freigegeben'}); await saveItems(site.id); render(); toast('Freigegeben'); return; }
  if(act==='reopen'){ item.status='open'; await saveItems(site.id); render(); return; }
  if(act==='delete'){ if(confirm('Diesen Eintrag wirklich löschen?')){ STATE.items[site.id] = items.filter(i=>i.id!==id); await saveItems(site.id); render(); } return; }
}

  if(!gewerk || !gewerk.email){ toast('Für dieses Gewerk ist keine E-Mail-Adresse hinterlegt (siehe Einstellungen)'); return; }
  const subject = `Mängelmeldung ${site.name} — ${unit?unit.name:''} — ${item.title}`;
  const body =
`Baustelle: ${site.name}
Ort: ${unit ? unit.name : '—'}
Gewerk: ${gewerk.name}

Titel: ${item.title}
Beschreibung:
${item.desc || '—'}

Bitte die Fertigstellung anschließend über die App freimelden.
(Fotos zu diesem Punkt bitte in der App ansehen — App-Link separat.)`;
  const url = `mailto:${encodeURIComponent(gewerk.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = url;
}

/* image compression via canvas */
function compressImage(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 900;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

}

function weatherCodeToInfo(code){
  const map = {
    0:['&#9728;','Klar'], 1:['&#127780;','Überwiegend klar'], 2:['&#9925;','Teilweise bewölkt'], 3:['&#9729;','Bedeckt'],
    45:['&#127787;','Nebel'], 48:['&#127787;','Reifnebel'],
    51:['&#127783;','Leichter Nieselregen'], 53:['&#127783;','Nieselregen'], 55:['&#127783;','Starker Nieselregen'],
    61:['&#127783;','Leichter Regen'], 63:['&#127783;','Regen'], 65:['&#127783;','Starker Regen'],
    71:['&#10052;','Leichter Schneefall'], 73:['&#10052;','Schneefall'], 75:['&#10052;','Starker Schneefall'],
    80:['&#127783;','Regenschauer'], 81:['&#127783;','Regenschauer'], 82:['&#127783;','Heftiger Regenschauer'],
    95:['&#9889;','Gewitter'], 96:['&#9889;','Gewitter mit Hagel'],
  };
  const m = map[code] || ['&#9925;','Wechselhaft'];
  return {icon:m[0], desc:m[1]};
}

async function fetchWeather(siteId, dateKey){
  if(!navigator.geolocation){ toast('Standortabruf wird von diesem Gerät nicht unterstützt'); return; }
  toast('Standort wird ermittelt...');
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const { latitude, longitude } = pos.coords;
    try{
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weathercode`);
      const data = await res.json();
      const info = weatherCodeToInfo(data.current.weathercode);
      const w = { temp: Math.round(data.current.temperature_2m), icon: info.icon, desc: info.desc };
      STATE.diary[siteId][dateKey].weather = w;
      await saveDiary(siteId);
      render();
    }catch(err){ toast('Wetterabruf fehlgeschlagen — bitte Internetverbindung prüfen'); }
  }, ()=>{ toast('Standortzugriff wurde verweigert'); });
}

/* ---------------- speech input ---------------- */
function attachMic(btnId, textareaId){
  const btn = document.getElementById(btnId);
  if(!btn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ btn.style.display='none'; return; }
  const rec = new SR();
  rec.lang = 'de-DE'; rec.interimResults = false; rec.continuous = false;
  let recording = false;
  btn.onclick = ()=>{
    if(recording){ rec.stop(); return; }
    rec.start(); recording = true; btn.classList.add('rec');
  };
  rec.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    const ta = document.getElementById(textareaId);
    ta.value = ta.value ? ta.value + ' ' + text : text;
  };
  rec.onend = ()=>{ recording=false; btn.classList.remove('rec'); };
  rec.onerror = ()=>{ recording=false; btn.classList.remove('rec'); toast('Spracheingabe nicht möglich'); };
}

/* ============================================================
   VIEW: DATEIABLAGE
   ============================================================ */
async function renderDateien(el){
  const site = activeSite();
  if(!site){ el.innerHTML = noSiteEmpty(); return; }
  const files = STATE.files[site.id]||[];
  const cfg = await getCloudConfig();
  const cloudActive = !!(cfg && cfg.baseUrl);
  el.innerHTML = `
    <div class="page-head"><div><h1>Dateiablage</h1><div class="sub">${esc(site.name)}</div></div>
      <label class="btn btn-primary" style="margin:0;">+ Datei hochladen<input type="file" id="fUpload" multiple style="display:none;"></label>
    </div>
    ${cloudActive ? `
      <div class="shared-banner" style="background:var(--ok-bg); color:#0F5C3B;">&#9729; <div>Cloud-Speicher verbunden: <span class="mono">${esc(cfg.baseUrl)}</span>${cfg.folder? ` · Ordner: <span class="mono">${esc(cfg.folder)}/${esc(site.name)}</span>`:''}. Neue Dateien werden zusätzlich zur App auch dorthin hochgeladen. <a href="#" id="goCloudSettings" style="text-decoration:underline;">Verbindung verwalten</a></div></div>
    ` : `
      <div class="shared-banner">&#8505; <div>Noch kein Cloud-Speicher verbunden — Dateien liegen aktuell nur im geteilten App-Speicher. <a href="#" id="goCloudSettings" style="text-decoration:underline; font-weight:600;">Jetzt Cloud-Speicher einrichten</a></div></div>
    `}
    <div class="card" style="padding:6px 18px;"><div id="fileList"></div></div>
    <details style="margin-top:16px; font-size:13px; color:var(--muted);">
      <summary style="cursor:pointer; font-weight:600; color:var(--ink);">Wie bindet man echtes SharePoint an?</summary>
      <div style="margin-top:8px; line-height:1.6;">
        1) Diese App als Basis in eine eigene Web-Anwendung übernehmen (z.B. mit einem kleinen Node/Next.js-Backend).<br>
        2) Über die Microsoft Graph API und Azure-AD-App-Registrierung anmelden lassen (Microsoft-Login-Button).<br>
        3) Hochgeladene Dateien per Graph-API-Aufruf (<span class="mono">PUT /drives/{drive-id}/root:/Baustelle/Datei.pdf:/content</span>) direkt in die gewünschte SharePoint-Bibliothek schreiben.<br>
        4) Alternativ: Power Automate-Flow, der neue Dateien aus einem Upload-Postfach automatisch nach SharePoint verschiebt — ganz ohne eigenen Server.<br><br>
        Eine eigene Nextcloud/ownCloud-Instanz oder ein anderer WebDAV-Server lässt sich dagegen direkt oben unter „Einstellungen → Cloud-Speicher" mit Adresse und Zugangsdaten verbinden.
      </div>
    </details>
  `;
  document.getElementById('goCloudSettings')?.addEventListener('click', (e)=>{ e.preventDefault(); currentView='einstellungen'; settingsTab='cloud'; renderNavState(); render(); });

  document.getElementById('fUpload').onchange = async (e)=>{
    for(const f of Array.from(e.target.files)){
      const reader = new FileReader();
      const dataUrl = await new Promise(res=>{ reader.onload=()=>res(reader.result); reader.readAsDataURL(f); });
      if(f.size > 4.5*1024*1024){ toast(`"${f.name}" ist zu groß für die Prototyp-Ablage (max. ~4 MB)`); continue; }
      const fileObj = { id: uid(), name: f.name, size: f.size, type: f.type, dataUrl, addedAt: new Date().toISOString(), cloudStatus: cloudActive ? 'pending' : 'local' };
      STATE.files[site.id].push(fileObj);
      await saveFiles(site.id); render();
      if(cloudActive){
        const result = await cloudPut([site.name, f.name], dataUrl, f.type);
        fileObj.cloudStatus = result.ok ? 'synced' : 'failed';
        await saveFiles(site.id); render();
        if(!result.ok) toast(`"${f.name}" konnte nicht in die Cloud hochgeladen werden`);
      }
    }
  };
  const listEl = document.getElementById('fileList');
  listEl.innerHTML = files.length ? files.map(f=>`
    <div class="file-row">
      <span class="ic">${f.type?.startsWith('image')?'&#128247;':'&#128196;'}</span>
      <div class="n">${esc(f.name)}<div class="s">${(f.size/1024).toFixed(0)} KB · ${fmtDateShort(f.addedAt)} ${cloudBadge(f.cloudStatus)}</div></div>
      ${f.cloudStatus==='failed' ? `<button class="btn btn-sm btn-ghost" data-retry="${f.id}">Erneut senden</button>` : ''}
      <a class="btn btn-sm btn-ghost" href="${f.dataUrl}" download="${esc(f.name)}">Herunterladen</a>
      <button class="btn btn-sm btn-ghost" data-del="${f.id}">Löschen</button>
    </div>`).join('') : `<div class="empty" style="border:none;">Noch keine Dateien abgelegt.</div>`;
  listEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', async ()=>{
    STATE.files[site.id] = files.filter(f=>f.id!==b.dataset.del);
    await saveFiles(site.id); render();
  }));
  listEl.querySelectorAll('[data-retry]').forEach(b=>b.addEventListener('click', async ()=>{
    const f = files.find(x=>x.id===b.dataset.retry);
    f.cloudStatus = 'pending'; render();
    const result = await cloudPut([site.name, f.name], f.dataUrl, f.type);
    f.cloudStatus = result.ok ? 'synced' : 'failed';
    await saveFiles(site.id); render();
  }));
}

function cloudBadge(status){
  if(status==='synced') return `· <span style="color:var(--ok);">&#9729; in Cloud gesichert</span>`;
  if(status==='pending') return `· <span style="color:var(--pending);">&#9729; wird hochgeladen…</span>`;
  if(status==='failed') return `· <span style="color:var(--warn);">&#9729; Upload fehlgeschlagen</span>`;
  return '';
}

let settingsTab = 'raeume';

    <div class="tabs">

  `;

}

      <div class="field" style="display:flex; gap:8px; align-items:flex-end;">
        <div style="flex:1;"><label>Neuer Raum / Neue Wohneinheit</label><input type="text" id="newUnit" placeholder="z.B. Wohnung 3, OG links"></div>
        <button class="btn btn-primary" id="addUnitBtn">Hinzufügen</button>
      </div>
      <div id="unitList" style="margin-top:6px;">

/* ============================================================
   EINSTELLUNGEN: CLOUD-SPEICHER
   ============================================================ */
async function renderCloudSettings(body){
  body.innerHTML = `<div class="card" style="padding:16px 18px;"><div class="sub">Verbindung wird geladen…</div></div>`;
  const cfg = (await getCloudConfig()) || { provider:'webdav', baseUrl:'', folder:'Baustellen-Manager', authType:'basic', connected:false };
  const creds = (await getCloudCreds()) || { username:'', password:'', token:'' };

  body.innerHTML = `
    <div class="shared-banner">&#8505; <div>Server-Adresse und Zielordner sind <b>team-weit sichtbar</b>. Benutzername/Passwort bzw. Token bleiben <b>ausschließlich auf deinem eigenen Konto</b> gespeichert und werden nicht mit anderen geteilt — jede Person meldet sich hier mit ihrem eigenen Zugang an.</div></div>
    <div class="card" style="padding:16px 18px; margin-bottom:16px;">
      <div class="field">
        <label>Anbieter</label>
        <select id="cProvider">
          <option value="webdav" ${cfg.provider==='webdav'?'selected':''}>Nextcloud / ownCloud (WebDAV)</option>
          <option value="webdav-generic" ${cfg.provider==='webdav-generic'?'selected':''}>Sonstiger WebDAV-Server</option>
          <option value="custom" ${cfg.provider==='custom'?'selected':''}>Eigene REST-Schnittstelle (Custom API)</option>
        </select>
      </div>
      <div class="field">
        <label>Server-Adresse</label>
        <input type="text" id="cBaseUrl" placeholder="https://cloud.deinefirma.de/remote.php/dav/files/BENUTZERNAME" value="${esc(cfg.baseUrl)}">
      </div>
      <div class="field">
        <label>Zielordner (optional)</label>
        <input type="text" id="cFolder" placeholder="Baustellen-Manager" value="${esc(cfg.folder||'')}">
      </div>
      <div class="row2">
        <div class="field">
          <label>Anmeldeart</label>
          <select id="cAuthType">
            <option value="basic" ${cfg.authType==='basic'?'selected':''}>Benutzername &amp; Passwort</option>
            <option value="bearer" ${cfg.authType==='bearer'?'selected':''}>Zugriffs-Token (Bearer)</option>
          </select>
        </div>
        <div></div>
      </div>
      <div id="authFields"></div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;">
        <button class="btn btn-primary" id="cSave">Verbindung speichern</button>
        <button class="btn btn-ghost" id="cTest">Verbindung testen</button>
        ${cfg.baseUrl? `<button class="btn btn-ghost" id="cDisconnect">Trennen</button>` : ''}
      </div>
      <div id="cStatus" style="margin-top:12px; font-size:13px;">
        ${cfg.baseUrl ? `<span class="pill ${cfg.connected?'done':'pending'}">${cfg.connected? 'Zuletzt erfolgreich verbunden':'Noch nicht getestet'}</span>` : `<span class="pill open">Kein Cloud-Speicher verbunden</span>`}
      </div>
    </div>
    <details style="font-size:13px; color:var(--muted);">
      <summary style="cursor:pointer; font-weight:600; color:var(--ink);">Welche Cloud-Dienste funktionieren hier direkt?</summary>
      <div style="margin-top:8px; line-height:1.65;">
        Diese App spricht Cloud-Speicher über das offene <b>WebDAV</b>-Protokoll an. Das funktioniert direkt mit einer eigenen <b>Nextcloud- oder ownCloud-Instanz</b> (Adresse meist <span class="mono">https://DEINE-CLOUD/remote.php/dav/files/BENUTZERNAME/</span>) oder jedem anderen WebDAV-fähigen Server, sofern dieser CORS-Anfragen aus dem Browser zulässt.<br><br>
        <b>SharePoint, OneDrive, Google Drive und Dropbox</b> lassen sich aus Sicherheitsgründen nicht per einfachem Benutzername/Passwort aus einer Browser-Seite ansprechen — diese Dienste verlangen einen offiziellen Microsoft-/Google-Login (OAuth) über eine registrierte Anwendung. Dafür bräuchte man diese App als Basis für eine eigene Anwendung mit kleinem Backend (siehe Hinweis unter „Dateiablage"). Falls ihr eine eigene Schnittstelle (z.B. eine kleine Firmen-API) bereitstellt, nutzt dafür die Option „Eigene REST-Schnittstelle" mit Token-Anmeldung.
      </div>
    </details>
  `;

  function renderAuthFields(){
    const at = document.getElementById('cAuthType').value;
    const box = document.getElementById('authFields');
    if(at==='bearer'){
      box.innerHTML = `<div class="field"><label>Zugriffs-Token</label><input type="password" id="cToken" placeholder="Token einfügen" value="${esc(creds.token||'')}"></div>`;
    }else{
      box.innerHTML = `
        <div class="row2">
          <div class="field"><label>Benutzername</label><input type="text" id="cUser" value="${esc(creds.username||'')}"></div>
          <div class="field"><label>Passwort / App-Passwort</label><input type="password" id="cPass" value="${esc(creds.password||'')}"></div>
        </div>`;
    }
  }
  renderAuthFields();
  document.getElementById('cAuthType').addEventListener('change', renderAuthFields);

  async function saveCloudForm(){
    const provider = document.getElementById('cProvider').value;
    const baseUrl = document.getElementById('cBaseUrl').value.trim();
    const folder = document.getElementById('cFolder').value.trim();
    const authType = document.getElementById('cAuthType').value;
    if(!baseUrl){ toast('Bitte eine Server-Adresse eingeben'); return false; }
    const newCfg = { provider, baseUrl, folder, authType, connected: cfg.connected||false };
    const newCreds = authType==='bearer'
      ? { token: document.getElementById('cToken').value.trim() }
      : { username: document.getElementById('cUser').value.trim(), password: document.getElementById('cPass').value };
    await setCloudConfig(newCfg);
    await setCloudCreds(newCreds);
    return true;
  }

  document.getElementById('cSave').onclick = async ()=>{
    const ok = await saveCloudForm();
    if(ok){ toast('Verbindung gespeichert'); render(); }
  };

  document.getElementById('cTest').onclick = async ()=>{
    const ok = await saveCloudForm();
    if(!ok) return;
    const btn = document.getElementById('cTest');
    btn.innerHTML = '<span class="spinner"></span> Teste Verbindung...'; btn.disabled = true;
    const result = await cloudTestConnection();
    const liveCfg = (await getCloudConfig());
    liveCfg.connected = result.ok;
    await setCloudConfig(liveCfg);
    if(result.ok) toast('Verbindung erfolgreich!');
    else if(result.reason==='auth') toast('Anmeldung fehlgeschlagen — Zugangsdaten prüfen');
    else if(result.reason==='notfound') toast('Ordner/Adresse nicht gefunden (404)');
    else if(result.reason==='network') toast('Verbindung fehlgeschlagen — evtl. blockiert der Server Browser-Anfragen (CORS)');
    else toast('Verbindung fehlgeschlagen (Status ' + (result.status||'?') + ')');
    render();
  };

  const discBtn = document.getElementById('cDisconnect');
  if(discBtn) discBtn.onclick = async ()=>{
    if(!confirm('Cloud-Verbindung wirklich trennen?')) return;
    await setCloudConfig({ provider:'webdav', baseUrl:'', folder:'', authType:'basic', connected:false });
    await setCloudCreds({});
    toast('Verbindung getrennt'); render();
  };
}


function showModal(innerHtml){
  closeModal();
  const bg = document.createElement('div'); bg.className='modal-bg'; bg.id='activeModalBg';
  bg.innerHTML = `<div class="modal"><button class="modal-close" id="modalCloseBtn">&times;</button>${innerHtml}</div>`;
  bg.addEventListener('click', (e)=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
  document.getElementById('modalCloseBtn').onclick = closeModal;
}
function closeModal(){ document.getElementById('activeModalBg')?.remove(); }

/* ---------------- iOS Home-Bildschirm-Hinweis ---------------- */
async function initIosInstallBanner(){
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  if(!isIos || isStandalone) return;
  let dismissed = false;
  try{ const r = await window.storage.get('ios-banner-dismissed', false); dismissed = !!r; }catch(e){ dismissed = false; }
  if(dismissed) return;
  const banner = document.getElementById('iosInstallBanner');
  banner.style.display = 'flex';
  document.getElementById('dismissIosBanner').onclick = async ()=>{
    banner.style.display = 'none';
    try{ await window.storage.set('ios-banner-dismissed', 'true', false); }catch(e){}
  };
}
initIosInstallBanner();
